<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="2;url=https://reaper-panel.paaact-gg.workers.dev">
<title>Dark Society</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090b;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif}
.card{text-align:center}
h1{font-size:48px;font-weight:900;color:#cc1a1a;letter-spacing:8px;margin-bottom:8px}
p{color:#444;font-size:14px;letter-spacing:2px;margin-bottom:32px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#cc1a1a;margin:0 3px;animation:pulse 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>
<div class="card">
  <h1>☠ DS</h1>
  <p>DARK SOCIETY PANEL</p>
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
<script>setTimeout(()=>location.href='https://reaper-panel.paaact-gg.workers.dev',2000)</script>
</body>
</html>
